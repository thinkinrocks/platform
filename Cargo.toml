[package]
name = "tr"
version = "0.0.0"
edition = "2024"

[dependencies]
askama = "0.14.0"
axum = "0.8.6"
dotenvy = "0.15.7"
serde = "1.0.228"
serde_json = "1.0.145"
sqlx = { version = "0.8.6", features = ["runtime-tokio"] }
tokio = { version = "1.48.0", features = ["macros", "net", "rt-multi-thread", "sync", "tracing"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
